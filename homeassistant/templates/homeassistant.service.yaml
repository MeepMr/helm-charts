apiVersion: v1
kind: Service
metadata:
  name: "{{ include "homeassistant.release" . }}-service"
  labels:
    app: "{{ include "homeassistant.release" . }}"
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: "{{ include "homeassistant.release" . }}"
