apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-frontend
  labels:
    app: {{ .Release.Name }}-{{ .Chart.Name }}-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Chart.Name }}-frontend
  template:
    metadata:
      name: {{ .Release.Name }}-{{ .Chart.Name }}-frontend
      labels:
        app: {{ .Release.Name }}-{{ .Chart.Name }}-frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: {{ .Release.Name }}-{{ .Chart.Name }}-frontend
          image: "ghcr.io/patchmon/patchmon-frontend:{{ .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          {{- with .Values.patchmon.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: patchmon-volume
              mountPath: /usr/share/nginx/html/assets
              subPath: patchmon-assets
      restartPolicy: Always
      volumes:
        - name: patchmon-volume
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}- {{ .Chart.Name }}-pvc