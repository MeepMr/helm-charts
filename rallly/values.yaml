secrets:
  ralllySecretRef: null
  oidcSecretRef: null
  databaseSecretRef: null
  smtpSecretRef: null

rallly:
  smtp:
    enabled: false
  allowedEmails: '*'
  resources:
    requests:
      cpu: 0.1
      memory: 512Mi
      ephemeral-storage: 100Mi
    limits:
      cpu: 1
      memory: 768Mi
      ephemeral-storage: 250Mi
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

ingress:
  clusterIssuer: null
  domain: null